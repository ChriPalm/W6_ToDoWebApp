{% extends "base.html" %}
{% block title_extra %} — Logga in{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="text-center mb-4">W:6 Logga in</h2>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Användarnamn</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Lösenord</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-w6 w-100">Logga in</button>
      </form>
      <p class="text-center mt-3 mb-0">
        <a href="{{ url_for('register') }}">Registrera nytt konto</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
